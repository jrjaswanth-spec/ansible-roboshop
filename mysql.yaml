- name: setup msql server
  hosts: mysql
  become: yes
  tasks:
    - name: install mysql server
      ansible.builtin.server:
       name: mysqld
       state: present

    - name: start and enable mysql
      ansible.builtin.service:
        name: mysqld
        sate: started
        enabled: yes   

    - name: setup root passworc
      ansible.builtin.command: mysql_secure_installation --set-root-pass RobosShop@1
      